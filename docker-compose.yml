services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: enterprise-ai-agent-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: enterprise_ai_agent
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d enterprise_ai_agent"]
      interval: 5s
      timeout: 5s
      retries: 12
